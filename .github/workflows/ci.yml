name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  restore:
    name: Restore
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Restore solution
        run: dotnet restore MessageBridge.sln

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Restore for formatting
        run: dotnet restore MessageBridge.sln

      - name: Validate formatting
        run: dotnet format MessageBridge.sln --verify-no-changes

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Restore for build
        run: dotnet restore MessageBridge.sln

      - name: Build solution
        run: dotnet build MessageBridge.sln -c Release --no-restore

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Restore for tests
        run: dotnet restore MessageBridge.sln

      - name: Run non-integration tests
        run: |
          dotnet test tests/MessageBridge.Application.Tests/MessageBridge.Application.Tests.csproj --no-restore
          dotnet test tests/MessageBridge.Contracts.Tests/MessageBridge.Contracts.Tests.csproj --no-restore
          dotnet test tests/MessageBridge.Domain.Tests/MessageBridge.Domain.Tests.csproj --no-restore
          dotnet test tests/MessageBridge.Infrastructure.Tests/MessageBridge.Infrastructure.Tests.csproj --no-restore
          dotnet test tests/MessageBridge.Publisher.Tests/MessageBridge.Publisher.Tests.csproj --no-restore
          dotnet test tests/MessageBridge.Publisher.EntityFrameworkCore.Tests/MessageBridge.Publisher.EntityFrameworkCore.Tests.csproj --no-restore
          dotnet test tests/MessageBridge.Worker.Tests/MessageBridge.Worker.Tests.csproj --no-restore

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Restore for integration tests
        run: dotnet restore MessageBridge.sln

      - name: Verify Docker is available
        run: docker info

      - name: Run Testcontainers integration tests
        run: dotnet test tests/MessageBridge.IntegrationTests/MessageBridge.IntegrationTests.csproj --no-restore

  buf-checks:
    name: Buf checks
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint protobuf contracts
        run: buf lint

      - name: Create local base branch for comparison
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "$BASE_REF:$BASE_REF"

      - name: Check breaking changes against base branch
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          module_path="src/MessageBridge.Contracts/protos"
          if git ls-tree -r --name-only "$BASE_REF" -- "$module_path" | grep -Eq '\.proto$'; then
            buf breaking --against ".git#branch=$BASE_REF"
          else
            echo "No protobuf contracts found on $BASE_REF; skipping breaking-change comparison."
          fi

  samples:
    name: Sample build
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Restore for sample build
        run: dotnet restore MessageBridge.sln

      - name: Build sample project
        run: dotnet build samples/MessageBridge.SampleClient/MessageBridge.SampleClient.csproj -c Release --no-restore

  package-generation:
    name: Package generation
    runs-on: ubuntu-latest
    needs: [restore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Restore for packing
        run: dotnet restore MessageBridge.sln

      - name: Pack contracts
        run: |
          dotnet pack src/MessageBridge.Contracts/MessageBridge.Contracts.csproj -c Release --no-restore -o ./artifacts
          dotnet pack src/MessageBridge.Publisher/MessageBridge.Publisher.csproj -c Release --no-restore -o ./artifacts
          dotnet pack src/MessageBridge.Publisher.EntityFrameworkCore/MessageBridge.Publisher.EntityFrameworkCore.csproj -c Release --no-restore -o ./artifacts
